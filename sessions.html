<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FUNdamentals">
  <meta name="theme-color" content="#0A1628">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
<title>Sessions — Spearfishing FUNdamentals</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
:root{--midnight:#0A1628;--deep:#0D2D4A;--surge:#00CFAD;--coral:#FF5C3A;--sand:#F0EDE6;--muted:rgba(240,237,230,0.55);--dim:rgba(255,255,255,0.07);--surge-dim:rgba(0,207,173,0.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#07101e;color:var(--sand);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(10,22,40,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--dim)}
.nav-brand{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
.nav-brand img{height:36px;opacity:0.9}
.nav-brand-text{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--sand);line-height:1.1}
.nav-brand-text span{display:block;font-size:0.55rem;letter-spacing:0.2em;color:var(--surge)}
.nav-right{display:flex;gap:1rem;align-items:center}
.nav-link{color:var(--muted);text-decoration:none;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;transition:color 0.2s}
.nav-link:hover{color:var(--surge)}

/* Mobile styles */
.nav-toggle{display:none;width:32px;height:32px;background:none;border:none;cursor:pointer;position:relative;z-index:1001}
.hamburger,.hamburger::before,.hamburger::after{content:'';display:block;width:24px;height:2px;background:var(--sand);position:absolute;transition:0.3s}
.hamburger{top:50%;left:50%;transform:translate(-50%,-50%)}
.hamburger::before{top:-7px;left:0}.hamburger::after{top:7px;left:0}
.nav-toggle.active .hamburger{background:transparent}
.nav-toggle.active .hamburger::before{top:0;transform:rotate(45deg)}
.nav-toggle.active .hamburger::after{top:0;transform:rotate(-45deg)}

.mobile-menu{position:fixed;inset:0;background:var(--midnight);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:0.4s}
.mobile-menu.active{opacity:1;visibility:visible}
.mobile-links{list-style:none;text-align:center}
.mobile-links li{margin:1.5rem 0}
.mobile-links a{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--sand);text-decoration:none}

@media(max-width:768px){.nav-right{display:none}.nav-toggle{display:block}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <img src="/icons/icon-180.png" alt="Logo">
    <div class="nav-brand-text">FUNdamentals<span>Spearfishing</span></div>
  </a>
  <div class="nav-right">
    <a href="/articles" class="nav-link">Articles</a>
    <a href="/portal" class="nav-link">Portal</a>
  </div>
  <button class="nav-toggle" aria-label="Toggle menu">
    <div class="hamburger"></div>
  </button>
</nav>

<div class="mobile-menu">
  <ul class="mobile-links">
    <li><a href="/">Home</a></li>
    <li><a href="/sessions">Sessions</a></li>
    <li><a href="/articles">Articles</a></li>
    <li><a href="/portal">My Account</a></li>
  </ul>
</div>

<script>
  const navToggle = document.querySelector('.nav-toggle');
  const mobileMenu = document.querySelector('.mobile-menu');
  if (navToggle && mobileMenu) {
    navToggle.addEventListener('click', () => {
      navToggle.classList.toggle('active');
      mobileMenu.classList.toggle('active');
      document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
    });
  }
</script>
</body>
</html>
