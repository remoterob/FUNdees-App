<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Spearfishing FUNdamentals</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --midnight:#0A1628;--surge:#00CFAD;--sand:#F0EDE6;--muted:rgba(240,237,230,0.55);--coral:#FF5C3A; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--midnight);color:var(--sand);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{background:rgba(13,45,74,0.7);border:1px solid rgba(0,207,173,0.2);border-radius:6px;padding:2.5rem;width:100%;max-width:420px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;margin-bottom:0.25rem}
  .sub{font-size:0.85rem;color:var(--muted);margin-bottom:1.5rem}
  .form-label{display:block;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:0.35rem}
  .form-input{width:100%;background:rgba(10,22,40,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:0.7rem 0.9rem;color:var(--sand);font-family:'Barlow',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;margin-bottom:1rem}
  .form-input:focus{border-color:var(--surge)}
  .btn{width:100%;background:var(--surge);color:var(--midnight);border:none;padding:0.85rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:3px;cursor:pointer}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .alert{padding:0.75rem 1rem;border-radius:3px;font-size:0.83rem;margin-bottom:1rem;display:none}
  .alert.error{background:rgba(255,92,58,0.12);border:1px solid rgba(255,92,58,0.3);color:#ff8a70;display:block}
  .alert.success{background:rgba(0,207,173,0.1);border:1px solid rgba(0,207,173,0.3);color:var(--surge);display:block}
</style>
</head>
<body>
<div class="card">
  <h1>New Password</h1>
  <p class="sub">Enter a new password for your account.</p>
  <div id="alert" class="alert"></div>
  <div id="form-wrap">
    <label class="form-label">New Password</label>
    <input id="pw1" class="form-input" type="password" placeholder="Min. 8 characters">
    <label class="form-label">Confirm Password</label>
    <input id="pw2" class="form-input" type="password" placeholder="Repeat password">
    <button id="btn" class="btn" onclick="resetPassword()">Set New Password</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://ldlvzkjdbsabwyubdtly.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkbHZ6a2pkYnNhYnd5dWJkdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzI2OTgsImV4cCI6MjA5MDY0ODY5OH0.s3WFwMZRoSzeKVLQwPGnJCU4VtaSJ3KWUJfpo0i6m8c';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  async function resetPassword() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const alert = document.getElementById('alert');

    if (pw1.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
    if (pw1 !== pw2)    { showAlert('Passwords do not match.', 'error'); return; }

    document.getElementById('btn').disabled = true;
    document.getElementById('btn').textContent = 'Saving...';

    const { error } = await sb.auth.updateUser({ password: pw1 });

    if (error) {
      showAlert(error.message, 'error');
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').textContent = 'Set New Password';
    } else {
      showAlert('Password updated! Redirecting to sign in...', 'success');
      document.getElementById('form-wrap').style.opacity = '0.4';
      setTimeout(() => { window.location.href = '/auth.html'; }, 2000);
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }
</script>
</body>
</html>
